services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: pagepay
      MYSQL_USER: pagepay
      MYSQL_PASSWORD: pagepass
    volumes:
      - mysql_data:/var/lib/mysql
    # Without this, `depends_on: db` only waits for the container to start —
    # not for MySQL to actually accept connections. The api/cron workers
    # then boot before mysqld is ready, their first DB call raises 2003,
    # and the entrypoint logs fill with "Skipping create_all" warnings.
    # `mysqladmin ping` returns 0 only when MySQL is ready for auth.
    # NOTE: MySQL port is NOT exposed to the host. Use `docker exec` or
    # port-forwarding if you need direct DB access in development.
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+aiomysql://pagepay:pagepass@db:3306/pagepay
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: http://localhost:8081
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
  cron:
    build:
      context: .
      dockerfile: Dockerfile.cron
    environment:
      DATABASE_URL: mysql+aiomysql://pagepay:pagepass@db:3306/pagepay
      SECRET_KEY: ${SECRET_KEY}
      GNEWS_API_KEY: ${GNEWS_API_KEY:-}
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
    # run once every 6h. `depends_on: service_healthy` guarantees the first
    # invocation sees a live DB; the `|| true` keeps the loop alive across
    # later transient errors so we don't get a container restart storm.
    command: ["sh", "-c", "while true; do python -m app.services.cron || true; sleep 21600; done"]
  
  ngrok:
    image: ngrok/ngrok:latest
    command: http api:8000
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"  # ngrok web interface
    depends_on:
      - api
    networks:
      - default

volumes:
  mysql_data:

networks:
  default:
    driver: bridge
